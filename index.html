    <style>

      @media(max-width:760px){

        .rail-heading{align-items:center}

        .search-label{margin:10px 0 8px}

        .patient-list{display:flex;gap:7px;max-height:none;width:100%;overflow-x:auto;overflow-y:hidden;padding:0 0 7px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}
        .patient-row{flex:0 0 158px;width:158px;min-height:62px;padding:8px;scroll-snap-align:start}
        .rail-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px;padding-top:10px}
        .rail-actions .button{min-height:40px;padding:8px;font-size:12px}
        .rail-actions .text-button{grid-column:1/-1;min-height:34px;text-align:center}
        .privacy-note{display:none}
        .main-content{padding:16px 11px calc(36px + env(safe-area-inset-bottom))}
        .content-stack{gap:16px}
        .content-stack>[role="status"],.content-stack>.status-message,.content-stack>.notice{margin:0 0 2px;padding:9px 11px}
        .page-title-row{display:block}
        .page-title-row h1{font-size:23px;line-height:1.16;margin-bottom:7px}

        .operational-summary{grid-template-columns:repeat(2,minmax(0,1fr));box-shadow:none}

  <body>
    <div id="root"></div>
    <script>
      (()=>{const buildWorkflow=()=>{const stack=document.querySelector('.content-stack');const title=document.querySelector('.page-title-row');if(!stack||!title||document.querySelector('.company-workflow'))return false;const section=document.createElement('section');section.className='company-workflow';section.setAttribute('aria-labelledby','company-workflow-title');section.innerHTML=`<div class="company-workflow__head"><div class="company-workflow__eyebrow">Company workflow placement</div><h2 id="company-workflow-title">Where BCG-Clock operates</h2><p>BCG-Clock sits between fragmented clinical documentation and downstream trial-matching or AI systems, preparing a traceable evidence record before automated inference begins.</p></div><div class="company-workflow__grid"><div class="company-workflow__step"><strong>Clinical source systems</strong><span>EHR notes, pathology, BCG administration records, labs, imaging, and procedure documentation.</span><small>Fragmented and not yet adjudicated</small></div><div class="company-workflow__arrow" aria-hidden="true">›</div><div class="company-workflow__step active"><span class="company-workflow__tag">This application</span><strong>BCG-Clock evidence coordination</strong><span>Reconstructs treatment chronology, checks timing windows, identifies missing or conflicting evidence, and retains source provenance.</span><small>Deterministic · auditable · before AI</small></div><div class="company-workflow__arrow" aria-hidden="true">›</div><div class="company-workflow__step"><strong>Downstream technology</strong><span>Trial-matching platforms, CTMS worklists, analytics, and AI-assisted candidate ranking.</span><small>Receives bounded, structured evidence</small></div><div class="company-workflow__arrow" aria-hidden="true">›</div><div class="company-workflow__step"><strong>Human adjudication</strong><span>Clinical coordinators and investigators confirm referral, eligibility, follow-up, and enrollment decisions.</span><small>Final judgment remains human</small></div></div><div class="company-workflow__foot"><strong>Operational role:</strong> evidence preparation and prescreening support, not diagnosis or autonomous eligibility determination.</div>`;title.insertAdjacentElement('afterend',section);return true};if(!buildWorkflow()){const observer=new MutationObserver(()=>{if(buildWorkflow())observer.disconnect()});observer.observe(document.documentElement,{childList:true,subtree:true});setTimeout(()=>observer.disconnect(),10000)}})();
    </script>
  </body>
